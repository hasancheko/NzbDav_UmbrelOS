version: "3.7"

services:
  app_proxy:
    environment:
      # This matches the folder name + service name
      APP_HOST: myapps-nzbdav_server_1
      APP_PORT: 3000

  server:
    image: nzbdav/nzbdav:latest
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      # Umbrel provides the $APP_DATA_DIR variable dynamically
      - ${APP_DATA_DIR}/data:/config